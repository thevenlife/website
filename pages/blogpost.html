<!-- Blog -->
      <script>

      let params = new URLSearchParams(document.location.search);
      let blogtitle = params.get("blogtitle");
      let blogdate = params.get("blogdate");
      let blogimage = params.get("blogimage");
      let blognumber = params.get("number");
      let blogslice = blognumber.substring(4,6);




      const substackUrl = "http://venlife.substack.com/feed"; // Replace with your Substack domain
      const rssToJsonApi = "https://api.rss2json.com/v1/api.json?rss_url=http%3A%2F%2Fvenlife.substack.com%2Ffeed";

      async function fetchLatestPost() {
        try {
          const response = await fetch(rssToJsonApi);
          const data = await response.json();

          // Grab the latest 3 posts
          const latestPost = (data.items || []).reverse().slice(blogslice - 1, blogslice);

          let output = '';
          latestPost.forEach(item => {

            const str = item.content;
            const firstIndex = item.content.indexOf(blognumber);
            const secondIndex = item.content.indexOf(blognumber, firstIndex + 1);

            const contentResult = str.substring(firstIndex + 7, secondIndex - 1);

            // Extract the first image from the post content if it exists
            const imgMatch = item.content.match(/<img[^>]+src="([^">]+)"/);
            const imageUrl = imgMatch ? imgMatch[1] : '';

            output += `
              <div>
                <div class="blogrow">
                  <article class="substack-post2">
                  ${blogimage ? `<img src="${blogimage}" style="max-width:100%">` : ''}
                </div>
              <br>
              <br>

              <div class="blogrow">
                <div class="blogindexcolumnleft">
                  <div style="width:20%; float:left;">
                  <img src="../graphics/icons/iconblog.jpg" style="border-radius:50%; margin-left:2vw;">
                  </div>
                  <div style="width:80%; float:left;">
                  <p class="blog" style="margin-left:10vmin;">The Wine Club<br>${blogdate}</p>
                  </div>
                </div>
                <div class="blogindexcolumnright">
                </div>
              </div>
              <br>
              <div style="width:100%; padding-bottom:2%; text-align:center">
              <h style="color:#7E1D17">${blogtitle}</h>
              </div>

              <div style="width:100%; padding:2%; text-align:center">
              <p>
              ${contentResult}
              </p>
              </div>

              <hr class="hrred" noshade>

              <div style="width:100%; padding-left:2%; padding-right:5%; text-align:right;">
              <p><a href="../pages/blog.html" style="text-decoration:none; color:#7E1D17">More Blogs...</a></p>
              </div>

              </div>

              </article>
              </div>
              `;
            });

            document.getElementById('substack-feed2').innerHTML = output;
            } catch (error) {
              console.error("Error fetching Substack feed:", error);
            }
          }
          fetchLatestPost();

</script>
