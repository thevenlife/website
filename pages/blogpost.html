<!-- Blog -->
      <script>
      const substackUrl = "http://venlife.substack.com/feed"; // Replace with your Substack domain
      const rssToJsonApi = "https://api.rss2json.com/v1/api.json?rss_url=http%3A%2F%2Fvenlife.substack.com%2Ffeed";
      async function fetchLatestPosts() {
        try {
          const response = await fetch(rssToJsonApi);
          const data = await response.json();

          // Grab the latest 3 posts
          const latestPosts = (data.items || []).slice(0, 50);

          let output = '';
          latestPosts.forEach(item => {
            // Extract the first image from the post content if it exists
            const imgMatch = item.content.match(/<img[^>]+src="([^">]+)"/);
            const imageUrl = imgMatch ? imgMatch[1] : '';

            output += `

              <div>
              <article class="substack-post">
              ${imageUrl ? `<img src="${imageUrl}" alt="${item.title}" style="max-width:100%">` : ''}
              <br>
              <br>

              <div class="blogrow">

              <div class="blogcolumnleft">
              <img src="../graphics/icons/iconblog.jpg" style="border-radius:50%; margin-left:2vw;">
              </div>

              <div class="blogcolumnright">
              <p class="blog" style="margin-left:2vw;">The Wine Club<br>${item.pubDate.substring(0,10)}</p>
              </div>

              </div>

              <div style="width:100%; padding-top:6%; padding-bottom:2%; text-align:center">
              <h style="color:#7E1D17">${item.title}</h>
              </div>

              <div style="width:100%; padding:2%; text-align:center">
              <p>${item.description.substring(0, 150)}...</p>
              </div>

              <hr class="hrred" noshade>

              <div style="width:100%; padding-left:2%; padding-right:5%; text-align:right;">
              <p><a href="${item.link}" style="text-decoration:none; color:#7E1D17">Read More...</a></p>
              </div>

              </div>

              </article>
              </div>
              `;
            });

            document.getElementById('substack-feed').innerHTML = output;
            } catch (error) {
              console.error("Error fetching Substack feed:", error);
            }
          }
          fetchLatestPosts();

</script>

<div class="responsive-blog-column-grid" style="background-color:#fff; margin-top:14vh;" id="substack-feed">
</div>
